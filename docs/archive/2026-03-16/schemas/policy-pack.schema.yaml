deprecated: true
deprecated_note: "Archived reference only. Do not use for active MVP implementation. Use docs/mvp-build-spec.md."

version: 1
entity: PolicyPack
required:
  - id
  - confidence_threshold
  - global_rules
  - role_rules
  - mandatory_gates
  - closure_conditions
fields:
  id:
    type: string
  confidence_threshold:
    type: float
    min: 0.0
    max: 1.0
  global_rules:
    type: list[string]
  role_rules:
    type: object
    additionalProperties:
      type: list[string]
  mandatory_gates:
    type: object
    required:
      - global_defaults
      - thread_custom
    fields:
      global_defaults:
        type: list[string]
      thread_custom:
        type: list[string]
  closure_conditions:
    type: list[string]
  stuck_threshold_minutes:
    type: integer
    min: 1
    required: false
  turn_retry_limit:
    type: integer
    min: 0
    required: false
constraints:
  - confidence_threshold default is 0.95
  - global_defaults must include parse/schema gates
  - precedence follows section 10.1 in the v1 spec
