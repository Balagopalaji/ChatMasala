<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}ChatMasala{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/main.css">
  {% block head %}{% endblock %}
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="sidebar-header">
        <a href="/" class="logo">🌶 ChatMasala</a>
        <a href="/settings{% if workspace is defined %}?from={{ workspace.id }}{% endif %}" class="settings-link" title="Settings">⚙</a>
      </div>
      <div class="sidebar-section-label">Workspaces</div>
      <nav class="workspace-list">
        {% block sidebar_workspaces %}{% endblock %}
      </nav>
      <div class="sidebar-footer">
        <form method="post" action="/workspaces/new" style="display:inline">
          <button type="submit" class="new-workspace-btn">+ New Workspace</button>
        </form>
      </div>
    </aside>
    <main class="main-content">
      {% block content %}{% endblock %}
    </main>
  </div>
  <script src="/static/main.js"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
